---
kueue:
  enabled: true
  controllerManager:
    tolerations:
      - operator: "Exists"
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    manager:
      resources:
        limits:
          cpu: "2"
          memory: 512Mi
        requests:
          cpu: 1m
          memory: 1Mi

installDefaultQueuesJob:
  enabled: false
  image: ghcr.io/fairport-io/apps/fairport-operator:0.0.4
  nodeSelector: {}
  tolerations: []
  affinity: {}
