kube-prometheus-stack:
  enabled: true
  alertmanager:
    service:
      port: 80
    alertmanagerSpec:
      replicas: 2
      podAntiAffinity: "hard"
      storage:
       volumeClaimTemplate:
         spec:
           storageClassName: openebs-hostpath
           resources:
             requests:
               storage: 2Gi
  prometheus:
    service:
      port: 80
    prometheusSpec:
      replicas: 2
      podAntiAffinity: "hard"
      retentionSize: 10GB
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false
      storageSpec:
       volumeClaimTemplate:
         spec:
           storageClassName: openebs-hostpath
           resources:
             requests:
               storage: 5Gi
  grafana:
    grafana.ini:
      # Disable Password Login for Simplicity
      auth:
        disable_login_form: true
      auth.anonymous:
        enabled: true
        org_role: Admin
      server:
        root_url: "%(protocol)s://%(domain)s/grafana/"
        serve_from_sub_path: true
    service:
      port: 80
    ingress:
      enabled: false
      path: /grafana
      pathType: Prefix
    sidecar:
      datasources:
        enabled: true

  prometheus-node-exporter:
    service:
      port: 9109
      targetPort: 9109

victoria-logs-cluster:
  enabled: false

  vlstorage:
    replicaCount: 2
    retentionPeriod: 2h
    persistentVolume:
      enabled: true
      storageClassName: openebs-hostpath
      size: 10Gi
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: vlstorage
            topologyKey: kubernetes.io/hostname

  vlinsert:
    replicaCount: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: vlinsert
            topologyKey: kubernetes.io/hostname

  vlselect:
    fullnameOverride: "vlselect"
    replicaCount: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: vlselect
            topologyKey: kubernetes.io/hostname

  vector:
    enabled: true
    # -- Example: How to ship syslog (RFC 3164 / RFC 5424) to VictoriaLogs using Vector
    # To ingest syslog from external systems, configure a syslog source in Vector's customConfig
    # and route it to the VictoriaLogs vlinsert Elasticsearch bulk endpoint.
    # Make sure to also expose TCP/UDP port 5140 in Vector service configurations if needed.
    #
    # customConfig:
    #   sources:
    #     syslog_source:
    #       type: "syslog"
    #       address: "0.0.0.0:5140"
    #       mode: "tcp" # or "udp"
    #   sinks:
    #     victoria_logs:
    #       type: "elasticsearch"
    #       inputs:
    #         - "syslog_source"
    #       # VictoriaLogs provides an Elasticsearch-compatible bulk API at /insert/elasticsearch/
    #       endpoint: "http://vlinsert-victoria-logs-cluster:9428/insert/elasticsearch/"
    #       # Stream fields are used by VictoriaLogs for indexing and fast filtering
    #       query:
    #         _stream_fields: "appname,facility,hostname,severity"
    #         _msg_field: "message"
    #         _time_field: "timestamp"


