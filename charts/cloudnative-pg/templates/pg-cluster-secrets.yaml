{{- if index .Values "cloudnative-pg" "enabled" }}
{{- range $name, $config := index .Values "pg-cluster-installer" "clusters" }}
{{- if and $config.bootstrap $config.bootstrap.initdb }}
---
# 1. Determine Secret Name from values.yaml
{{- $secretName := $config.bootstrap.initdb.secret.name | default (printf "%s-app-secret" $name) }}

# 2. Lookup existing secret to preserve password on upgrades
{{- $existingSecret := (lookup "v1" "Secret" $.Release.Namespace $secretName) | default dict }}
{{- $existingData := (get $existingSecret "data") | default dict }}

# 3. Determine Username (Read from bootstrap.initdb.owner)
{{- $username := $config.bootstrap.initdb.owner | default "postgres" }}

# 4. Determine Password (Config > Existing Secret > Random)
{{- $password := "" }}
{{- if $existingData.password }}
  {{- $password = (index $existingData "password") | b64dec }}
{{- else }}
  {{- $password = randAlphaNum 32 }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    cnpg.io/cluster: {{ $name }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $username }}
  password: {{ $password }}
{{- end }}
{{- end }}
{{- end }}
