{{- if .Values.kubeai.enabled }}
{{- if .Values.kubeai.metrics.prometheusOperator.kubeaiPodMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "kubeai.fullname" . }}
  labels:
    {{- include "kubeai.labels" . | nindent 4 }}
    {{- with .Values.kubeai.metrics.prometheusOperator.kubeaiPodMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "kubeai.labels" . | nindent 6 }} 
  podMetricsEndpoints:
  {{- .Values.kubeai.metrics.prometheusOperator.kubeaiPodMonitor.podMetricsEndpoints | toYaml | nindent 2 }}
{{- end }}
{{- end }}
