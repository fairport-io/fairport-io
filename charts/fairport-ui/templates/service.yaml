{{- $fairportUi := index .Values "fairport-ui" -}}
{{- if $fairportUi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: fairport-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- toYaml $fairportUi.labels | nindent 4 }}
spec:
  type: {{ $fairportUi.service.type }}
  ports:
  - port: {{ $fairportUi.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- toYaml $fairportUi.labels | nindent 4 }}
{{- end }}
